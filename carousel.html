    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            margin: 0;
        }

        .main-container {
            max-width: 900px;
            margin: 40px auto;
            background: white;

            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .carousel-item img {
            height: 600px;
            object-fit: cover;
            border-radius: 10px;
        }

        .btn-custom {
            background: #ffd814;
            font-weight: bold;
            border: none;
            color: black;
        }

        .btn-custom:hover {
            background: #f7ca00;
        }

        @media (max-width: 768px) {
            .carousel-item img {
                height: 250px;
            }
        }
        .btn {
            display: inline-block;
            padding: 10px;
            background: #ffd814;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<div class="container mt-5">
    
    <h2 class="text-center mb-4">Nasa Ponuda</h2>
    <div id="shopCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <picture>
                    <source srcset="img/promo1-small.jpg" media="(max-width: 600px)" >
                    <img src="slika7.jpg" class="d-block w-100" alt="Promo 1">
                </picture>
            </div>
            <div class="carousel-item">
                <picture>
                    <source srcset="slika9" media="(max-width: 600px)">
                    <img src="slika5.jpg" class="d-block w-100" alt="Promo 2">
                </picture>
            </div>
            <div class="carousel-item"><img src="slika1.jpg" class="d-block w-100" alt="3" height="200px"></div>
            <div class="carousel-item"><img src="slika2.jpg" class="d-block w-100" alt="4" height="200px"></div>
            <div class="carousel-item"><img src="slika3.jpg" class="d-block w-100" alt="5" height="200px"></div>
            <div class="carousel-item"><img src="slika4.jpg" class="d-block w-100" alt="6" height="200px"></div>
            <div class="carousel-item"><img src="slika5.jpg" class="d-block w-100" alt="7" height="200px"></div>
            <div class="carousel-item"><img src="slika6.jpg" class="d-block w-100" alt="8" height="200px"></div>
            <div class="carousel-item"><img src="slika7.jpg" class="d-block w-100" alt="9" height="200px"></div>
            <div class="carousel-item"><img src="slika8.jpg" class="d-block w-100" alt="10" height="200px"></div>
            <div class="carousel-item"><img src="slika9.jpg" class="d-block w-100" alt="10" height="200px"></div>
            <div class="carousel-item"><img src="slika10.jpg" class="d-block w-100" alt="10" height="200px"></div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#shopCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#shopCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <hr>

    <div class="main-container">
        <h3 class="mb-4">Kontaktirajte nas</h3>
        <form action="#" class="row g-3">
            
            <div class="col-md-6">
                <label class="form-label">Ime i Prezime</label>
                <input type="text" class="form-control" placeholder="Marko Marković" required>
            </div>

            <div class="col-md-6">
                <label class="form-label">Kolicina (broj)</label>
                <input type="number" class="form-control" min="1" max="10" value="1">
            </div>

            <div class="col-md-6">
                <label class="form-label">Datum kupovine</label>
                <input type="date" class="form-control">
            </div>

            <div class="col-md-6">
                <label class="form-label">Kategorija proizvoda</label>
                <select class="form-select">
                    <option selected disabled>Izaberi...</option>
                    <option>Graficke kartice</option>
                    <option>Periferije</option>
                    <option>Audio oprema</option>
                </select>
            </div>

            <div class="col-12 mt-3">
                <label class="form-label">Ocenite vase zadovoljstvo (Range)</label>
                <input type="range" class="form-range" min="0" max="5">
            </div>

            <div class="col-12">
                <label class="form-label">Vasa poruka</label>
                <textarea class="form-control" rows="3" placeholder="Napišite nešto više..."></textarea>
            </div>

            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="newsletter">
                    <label class="form-check-label" for="newsletter">
                        Prijavi se na newsletter
                    </label>
                </div>
            </div>

            <div class="col-12">
                <label class="form-label d-block">Nacin dostave:</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="dostava" id="kurir" value="kurir" checked>
                    <label class="form-check-label" for="kurir">Kurirska sluzba</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="dostava" id="licno" value="licno">
                    <label class="form-check-label" for="licno">Licno preuzimanje</label>
                </div>
            </div>

            <div class="col-12 mt-4 text-center">
                <button type="submit" class="btn btn-custom w-50">Posalji podatke</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
