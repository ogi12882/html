<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Navbar Example</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">ShopMate</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

  

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <div class="collapse mt-2" id="searchBox">
  <input type="text" class="form-control" placeholder="Search...">
</div>
        <button class="btn btn-outline-light me-2" 
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#searchBox">
  Search
  </button>
        <li class="nav-item">
          <a href="#" class="btn btn-outline-light me-2">Home</a>
        </li>
        <li class="nav-item">
          <button class="btn btn-outline-light me-2" data-bs-toggle="modal" data-bs-target="#aiModal">
  AI Helper
</button>
        </li>
        <li class="nav-item">
          <a class="btn btn-outline-light me-2" href="cart.html">Cart</a>
        </li>
        <li class="nav-item">
          <a class="btn btn-outline-light me-2" href="account.html">Account</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="modal fade" id="aiModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">AI Assistant</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" style="height: 300px; overflow-y: auto;">
        <div id="chatBox">
          <p><strong>AI:</strong> Hello! Ask me anything!</p>
        </div>
      </div>

      <div class="modal-footer">
        <input type="text" id="userInput" class="form-control" placeholder="Type a message...">
        <button class="btn btn-primary" onclick="sendMessage()">Send</button>
      </div>

    </div>
  </div>
</div>
<br><br>
<div class="container mt-3">
<h1>This is the home page. [WORK IN PROGRESS]</h1>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
