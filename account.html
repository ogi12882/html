<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShopMate Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .price {
            color: #b12704;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px;
            background: #ffd814;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }

            .btn:hover {
                background: #f7ca00;
            }

        @media (max-width: 768px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

                type="button"

                data-bs-target="#searchBox">
          Search
        </button>

        <li class="nav-item">

        </li>
        <li class="nav-item">
          <a class="btn btn-outline-light me-2" href="cart.html">Cart</a>
        </li>
        <li class="nav-item">
          <a class="btn btn-outline-light me-2" href="account.html">Account</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
